<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShelbyStory - Share your moment</title>
<link rel="stylesheet" href="./style.css">
<link rel="icon" href="./logo.png" type="image/png">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://kit.fontawesome.com/36cdc549b2.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
   <div class="logo"><a href="/">ShelbyStory</a></div>
  <div class="swipe-hints">

  <div class="swipe up">
    <div class="arrow">↑</div>
    <span>Scroll up</span>
  </div>
  </div>
  <div class="top-bar">
    <div class="top-actions">
     <div class="action-row">
    <button class="wallet-btn" id="upStory"><i class="fa-solid fa-upload"></i> Up Story</button>
    <button class="wallet-btn" id="btnStory" onclick="myStory()"><i class="fa-solid fa-bookmark"></i> My Story</button>
    <button class="wallet-btn" id="connect" >Connect Account</button>
    </div>
   
  </div>
  <div class="top-actions1">
    <button class="wallet-btn" id="btnNofi" onclick="toggleNotify()"><i class="fa-regular fa-bell"></i></button>
   <button class="wallet-btn" id="btnSearch" onclick="search()"><i class="fa-solid fa-magnifying-glass"></i></button>
      <button class="menu-toggle" id="btnMenu" onclick="toggleMenu()">
  <i class="fa-solid fa-bars"></i>
</button>
  </div>
  </div>
  
</header>
<div id="feed-loading">
  <div class="feed-loading-box">
    
    <div class="feed-loader">
      <div class="feed-heart">❤</div>
    </div>

    <div class="feed-loading-text">
      Wait a moment<span id="loadingDots"></span>
    </div>

  </div>
</div>
<div class="feed" id="feed">


</div>
   <div id="sentinel"></div>

<div class="swipe-hints">
  <div class="swipe down">
    <span>Scroll down</span>
    <div class="arrow">↓</div>
  </div>

</div>
<!-- Nút social x -->
<div id="xBtn">
  <a href=""><i class="fa-brands fa-x-twitter"></i></a>
</div>
<!-- Nút social dicord -->
<div id="discordBtn">
  <a href=""><i class="fa-brands fa-discord"></i></a>
</div>

<!-- Nút info -->
<div id="infoBtn" onclick="info()"><i class="fa-solid fa-info"></i></div>

<div class="credit">
  Copyright <i class="fa-regular fa-copyright"></i> 2026 <a class="author" href="/">ShelbyStory</a> & All Data stored on <a class="shelby" href="https://shelby.xyz/">Shelby</a>
</div>
<div class="story-modal-overlay" id="storyModal">

  <div class="story-modal-box">

    <span class="story-modal-close" id="storyCloseBtn">✕</span>
      <button class="story-upload-btn" id="open-ai-modal-btn">
  <i class="fa-solid fa-robot"></i> Upload Story with AI
</button>
    <h2 class="story-modal-title">Upload Story</h2>

    <!-- preview upload -->
    <div class="story-upload-area">

      <input
        type="file"
        id="storyFileInput"
        class="story-file-hidden"
        accept="image/*"
      >

      <div class="story-preview-box" id="storyPreviewBox">

        <img
          src="upload-placeholder.png"
          id="storyPreviewImage"
          class="story-preview-image"
        >

        <video
          id="storyPreviewVideo"
          class="story-preview-video"
          controls
          style="display:none"
        ></video>

        <div class="story-upload-text">
          Click to upload
        </div>

      </div>

    </div>

    <textarea
      id="storyCaption"
      class="story-caption"
      placeholder="Write a caption..."
    ></textarea>

    <button class="story-upload-btn" id="story-upload-btn">
      Upload
    </button>

  </div>

</div>
   <div class="story-ai-modal-overlay" id="storyAIModal">

  <div class="story-ai-modal-box">

    <span class="story-modal-close" id="storyAICloseBtn">✕</span>

    <h2 class="story-modal-title">
      Upload Story with AI <i class="fa-solid fa-robot"></i>
    </h2>

    <!-- 🔹 PROMPT -->
    <textarea
      id="aiPrompt"
      class="story-caption"
      placeholder="Describe the image you want to generate..."
    ></textarea>

    <button class="story-upload-btn" id="generateAIBtn">
      🎨 Generate Image
    </button>

    <div class="story-upload-area">

      <div class="story-preview-box" id="aiPreviewBox">

        <img
          id="aiGeneratedImage"
          class="story-preview-image"
          style="display:none"
        >

        <!-- placeholder -->
        <div class="story-upload-text" id="aiPlaceholderText">
          Your AI image will appear here
        </div>

      </div>

    </div>

    <div id="aiLoading" style="display:none; text-align:center;">
    </div>

    <textarea
      id="storyAICaption"
      class="story-caption"
      placeholder="Write a caption..."
    ></textarea>

    <button class="story-upload-btn" id="uploadAIStoryBtn">
      Upload
    </button>

  </div>

</div>
<div class="post-status-box" id="postStatus">
  <div class="post-status-content">
    <div class="post-spinner"></div>
    <p id="postStatusText">Uploading Story...</p>
  </div>
</div>

<div class="comment-panel" id="commentPanel">

  <div class="comment-header">
    <span class="comment-close" onclick="closeComment()">✕</span>
    Comments
    
  </div>

  <div id="comment-list" class="comment-list">


  </div>
  
  <div id="commentsend">

  </div>
  

</div>
<div id="storyWrapper">
   
  <div id="myStoryPage">

    <div class="myStoryHeader">
      <button onclick="closeMyStory()">←</button>
      <span id="profile"></span>
    </div>
    <div class="swipe up">
    <div class="arrow">↑</div>
    <span>Scroll up</span>
  </div>
    <div id="myStoryList" class="myStoryList"></div>
    <div class="hi"></div>
<div class="swipe-hints">
  <div class="swipe down">
    <span>Scroll down</span>
    <div class="arrow">↓</div>
  </div>
  </div>

</div>
<div class="notify-wrapper">


  <div id="notifyBox">

    <div class="notify-header">Notifications</div>

    <div id="notifyList"></div>

  </div>

</div>
  <script src="./index.js"></script>
</body>
</html>
